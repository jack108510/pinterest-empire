<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest Empire Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>📌 Pinterest Empire Dashboard</h1>
        <span class="last-updated" id="lastUpdated">Loading...</span>
      </div>
      <div class="header-right">
        <button class="btn" onclick="refreshData()">🔄 Refresh</button>
      </div>
    </header>

    <!-- Empire Totals -->
    <section class="empire-totals" id="empireTotals">
      <div class="metric-card big">
        <div class="metric-icon">👁️</div>
        <div class="metric-value" id="totalImpressions">—</div>
        <div class="metric-label">Total Impressions</div>
        <div class="metric-change" id="totalImpressionsChange"></div>
      </div>
      <div class="metric-card big">
        <div class="metric-icon">💬</div>
        <div class="metric-value" id="totalEngagements">—</div>
        <div class="metric-label">Total Engagements</div>
        <div class="metric-change" id="totalEngagementsChange"></div>
      </div>
      <div class="metric-card big">
        <div class="metric-icon">👆</div>
        <div class="metric-value" id="totalClicks">—</div>
        <div class="metric-label">Outbound Clicks</div>
        <div class="metric-change" id="totalClicksChange"></div>
      </div>
      <div class="metric-card big">
        <div class="metric-icon">📌</div>
        <div class="metric-value" id="totalSaves">—</div>
        <div class="metric-label">Total Saves</div>
        <div class="metric-change" id="totalSavesChange"></div>
      </div>
      <div class="metric-card big">
        <div class="metric-icon">👥</div>
        <div class="metric-value" id="totalAudience">—</div>
        <div class="metric-label">Total Audience</div>
        <div class="metric-change" id="totalAudienceChange"></div>
      </div>
    </section>

    <!-- Posting Stats Bar -->
    <section class="posting-bar" id="postingBar">
      <h2>📋 Today's Posting Status</h2>
      <div class="posting-grid" id="postingGrid">Loading...</div>
    </section>

    <!-- Per-Account Breakdown -->
    <section class="accounts-section">
      <h2>📊 Account Breakdown (Last 30 Days)</h2>
      <div class="accounts-grid" id="accountsGrid">Loading...</div>
    </section>


  </div>

  <script src="/app.js"></script>
</body>
</html>
