<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest Empire</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>📌 Pinterest Empire</h1>
    <p class="updated" id="updated">Loading...</p>

    <!-- Empire Total -->
    <div class="card total-card">
      <h2>Total Impressions (30d)</h2>
      <div class="big-number" id="totalImpressions">—</div>
      <div class="sub-stats" id="subStats"></div>
    </div>

    <!-- Per Account -->
    <h2 class="section-title">Accounts</h2>
    <div id="accounts"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
